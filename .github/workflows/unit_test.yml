name: API Tests

# ── Trigger ─────────────────────────────────────────────────────────────────
# Manual only — no schedule/cron. Run this from the Actions tab via
# "Run workflow", selecting the branch you want to test (e.g. UnitTest).
on:
  workflow_dispatch: {}

permissions:
  # Needed so the job can push the generated report back to the repo.
  contents: write

env:
  PROJECT_PATH: RelproApiTests/RelproApiTests.csproj

jobs:
  run-api-tests:
    runs-on: windows-latest

    # ── Secrets (NOT configured yet) ────────────────────────────────────
    # TEST_USERNAME / TEST_PASSWORD are intentionally NOT wired up yet.
    # When ready, add them under:
    #   Repo → Settings → Secrets and variables → Actions → New repository secret
    #     TEST_USERNAME
    #     TEST_PASSWORD
    # then add an `env:` block here, e.g.:
    #
    # env:
    #   TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
    #   TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need full history (not just the triggering commit) so we can
          # commit + push the report back without conflicts.
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore & build
        run: |
          dotnet restore "${{ env.PROJECT_PATH }}"
          dotnet build "${{ env.PROJECT_PATH }}" --configuration Release

      - name: Run API tests
        # Test pass/fail is irrelevant to this workflow's own success —
        # we always want to continue on to generate and push the report
        # regardless of outcome, so failures here are swallowed.
        continue-on-error: true
        run: |
          dotnet test "${{ env.PROJECT_PATH }}" --configuration Release --logger "trx"

      - name: Locate latest Extent report
        id: find_report
        if: always()
        shell: pwsh
        run: |
          # Reports are written under RelproApiTests\bin\Release\net8.0\Reports
          # per ExtentReportManager.cs (AppDomain.CurrentDomain.BaseDirectory +
          # "Reports") — relative to the project folder, not repo root, since
          # the .csproj lives in the RelproApiTests subfolder. Filenames are
          # timestamped, e.g. ApiTestReport_20260630_140522.html
          $reportDir = "RelproApiTests/bin/Release/net8.0/Reports"

          if (-not (Test-Path $reportDir)) {
            Write-Error "No Reports directory found at $reportDir — failing the job."
            exit 1
          }

          $latestReport = Get-ChildItem -Path $reportDir -Filter *.html |
                            Sort-Object LastWriteTime -Descending |
                            Select-Object -First 1

          if (-not $latestReport) {
            Write-Error "No .html report found in $reportDir — failing the job."
            exit 1
          }

          Write-Host "Found latest report: $($latestReport.FullName)"
          "report_path=$($latestReport.FullName)" >> $env:GITHUB_OUTPUT
          "report_name=$($latestReport.Name)" >> $env:GITHUB_OUTPUT

      - name: Publish report to repo folder
        if: always()
        shell: pwsh
        run: |
          # Destination folder inside the repo where reports are tracked.
          # Created automatically if it doesn't exist yet.
          $destDir = "reports"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null

          Copy-Item "${{ steps.find_report.outputs.report_path }}" -Destination "$destDir/${{ steps.find_report.outputs.report_name }}"

          # Also keep a stable "latest.html" pointer for easy linking/bookmarking.
          Copy-Item "${{ steps.find_report.outputs.report_path }}" -Destination "$destDir/latest.html"

      - name: Commit and push report
        if: always()
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add reports/

          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No report changes to commit."
          } else {
            git commit -m "chore(reports): add test report ${{ steps.find_report.outputs.report_name }} [skip ci]"
            git push
          }

      - name: Upload report as workflow artifact
        # Also attach the report as a downloadable build artifact, independent
        # of the repo commit above — handy for quick access from the Actions
        # run summary without browsing the repo.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: ${{ steps.find_report.outputs.report_path }}
          retention-days: 30
